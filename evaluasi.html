<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evaluasi - Operasi Pemrograman Dasar</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 p-5">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-lg">
      <a
        href="index.html"
        class="text-blue-600 hover:underline mb-4 inline-block mb-5"
        >&larr; Kembali ke Beranda</a
      >
      <div id="quiz-container">
        <h2 id="question" class="text-xl font-bold mb-4">
          Memuat pertanyaan...
        </h2>
        <div id="answers" class="space-y-2"></div>
        <div class="mt-6 flex justify-between">
          <button
            onclick="prevQuestion()"
            class="bg-gray-500 text-white px-4 py-2 rounded"
          >
            Kembali
          </button>
          <button
            onclick="nextQuestion()"
            class="bg-blue-600 text-white px-4 py-2 rounded"
          >
            Selanjutnya
          </button>
        </div>
      </div>
      <div id="result" class="hidden text-center">
        <h2 class="text-2xl font-bold">Hasil Evaluasi</h2>
        <p id="score" class="text-lg my-4"></p>
        <a href="index.html" class="bg-green-600 text-white px-6 py-2 rounded"
          >Kembali ke Beranda</a
        >
      </div>
    </div>

    <script>
      const questions = [
        { q: "Apa hasil dari 10 % 3?", a: ["1", "3", "0", "10"], correct: 0 },
        {
          q: "Manakah operator penugasan untuk menambah nilai variabel dengan angka lain?",
          a: ["==", "&&", "+=", "++"],
          correct: 2,
        },
        {
          q: "Operator manakah yang digunakan untuk membandingkan dua nilai secara identik (tipe data dan nilai)?",
          a: ["==", "===", "!=", ">"],
          correct: 1,
        },
        {
          q: "Apa hasil dari (5 > 3) && (2 < 4)?",
          a: ["false", "true", "null", "undefined"],
          correct: 1,
        },
        {
          q: "Apa fungsi dari operator ++ (increment)?",
          a: ["Mengurangi 1", "Menambah 1", "Mengalikan 2", "Membagi 2"],
          correct: 1,
        },
        {
          q: "Manakah yang merupakan operator logika OR?",
          a: ["&&", "!", "||", "<>"],
          correct: 2,
        },
        {
          q: "Apa hasil dari 5 + 2 * 3?",
          a: ["21", "11", "15", "10"],
          correct: 1,
        },
        {
          q: "Operator manakah yang digunakan untuk mengecek 'tidak sama dengan'?",
          a: ["!=", "==", "===", "<>"],
          correct: 0,
        },
        {
          q: "Apa nilai dari logika !true?",
          a: ["true", "null", "false", "undefined"],
          correct: 2,
        },
        {
          q: "Manakah operator untuk membandingkan lebih besar atau sama dengan?",
          a: ["<=", ">=", "==", "!="],
          correct: 1,
        },
      ];

      let currentQ = 0;
      let score = 0;
      let answers = new Array(questions.length).fill(null);

      function loadQuestion() {
        const q = questions[currentQ];
        document.getElementById("question").innerText =
          `${currentQ + 1}. ${q.q}`;
        const container = document.getElementById("answers");
        container.innerHTML = "";
        q.a.forEach((ans, i) => {
          container.innerHTML += `<button onclick="select(${i})" class="block w-full p-3 border rounded ${answers[currentQ] === i ? "bg-blue-200" : "bg-gray-50"}">${ans}</button>`;
        });
      }

      function select(i) {
        answers[currentQ] = i;
        loadQuestion();
      }

      function nextQuestion() {
        if (currentQ < questions.length - 1) {
          currentQ++;
          loadQuestion();
        } else {
          showResult();
        }
      }

      function prevQuestion() {
        if (currentQ > 0) {
          currentQ--;
          loadQuestion();
        }
      }

      function showResult() {
        score = answers.filter((a, i) => a === questions[i].correct).length;
        document.getElementById("quiz-container").classList.add("hidden");
        document.getElementById("result").classList.remove("hidden");
        document.getElementById("score").innerText =
          `Skor Anda: ${score} / ${questions.length}`;
      }

      loadQuestion();
    </script>
  </body>
</html>
